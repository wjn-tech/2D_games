<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Magical Targeting Sigil (Crosshair) -->
  <circle cx="32" cy="32" r="16" fill="none" stroke="#e74c3c" stroke-width="2" filter="url(#glow-red)" stroke-dasharray="8 4"/>
  <line x1="32" y1="20" x2="32" y2="44" stroke="#e74c3c" stroke-width="2" filter="url(#glow-red)"/>
  <line x1="20" y1="32" x2="44" y2="32" stroke="#e74c3c" stroke-width="2" filter="url(#glow-red)"/>
  <circle cx="32" cy="32" r="4" fill="#ffffff" filter="url(#glow-red)"/>
</svg>