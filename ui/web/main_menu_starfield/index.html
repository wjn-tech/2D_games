<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Main Menu Starfield</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      pointer-events: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>
  <script>
    (function () {
      const canvas = document.getElementById("starfield");
      const ctx = canvas.getContext("2d", { alpha: true });

      const starCount = 200;
      const maxMeteors = 3;
      const meteorSpawnRate = 0.02;
      const galaxyCenterRatio = { x: 0.7, y: 0.3 };
      const galaxyBaseRadius = 150;
      const galaxyRotationSpeed = 0.001;

      const stars = [];
      const meteors = [];
      let galaxyRotation = 0;
      let width = 1;
      let height = 1;

      function randomRange(min, max) {
        return Math.random() * (max - min) + min;
      }

      function resetStars() {
        stars.length = 0;
        for (let i = 0; i < starCount; i += 1) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            size: randomRange(0.5, 2.5),
            speed: randomRange(0.1, 0.6),
            opacity: Math.random(),
            twinkle: Math.random() * Math.PI * 2,
          });
        }
      }

      function resize() {
        width = Math.max(window.innerWidth, 1);
        height = Math.max(window.innerHeight, 1);
        canvas.width = width;
        canvas.height = height;
        resetStars();
      }

      function drawGalaxyLayers() {
        const centerX = width * galaxyCenterRatio.x;
        const centerY = height * galaxyCenterRatio.y;

        for (let layer = 0; layer < 3; layer += 1) {
          const radius = galaxyBaseRadius + layer * 50;
          const direction = layer % 2 === 0 ? 1 : -1;
          const layerRotation = galaxyRotation * direction * (1 + layer * 0.2);

          for (let i = 0; i < 200; i += 1) {
            const t = i / 200;
            const angle = t * Math.PI * 4 + layerRotation;
            const distance = t * radius;
            const x = centerX + Math.cos(angle) * distance;
            const y = centerY + Math.sin(angle) * distance;
            const alpha = (0.1 + t * 0.2) * (0.3 + layer * 0.2);
            const size = 1 + Math.random() * 2;

            ctx.fillStyle = `rgba(138, 43, 226, ${alpha.toFixed(3)})`;
            ctx.fillRect(x, y, size, size);
          }
        }
      }

      function drawStars() {
        stars.forEach((star) => {
          ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity.toFixed(3)})`;
          ctx.fillRect(star.x, star.y, star.size, star.size);

          if (star.size > 1.5) {
            ctx.fillStyle = `rgba(255, 255, 255, ${(star.opacity * 0.3).toFixed(3)})`;
            ctx.fillRect(star.x - star.size * 2, star.y, star.size * 4, star.size);
            ctx.fillRect(star.x, star.y - star.size * 2, star.size, star.size * 4);
          }
        });
      }

      function drawMeteors() {
        for (let i = meteors.length - 1; i >= 0; i -= 1) {
          const meteor = meteors[i];
          const tailX = meteor.x - Math.cos(meteor.angle) * meteor.length;
          const tailY = meteor.y - Math.sin(meteor.angle) * meteor.length;
          const segments = 14;

          for (let j = 0; j < segments; j += 1) {
            const t0 = j / segments;
            const t1 = (j + 1) / segments;
            const p0x = meteor.x + (tailX - meteor.x) * t0;
            const p0y = meteor.y + (tailY - meteor.y) * t0;
            const p1x = meteor.x + (tailX - meteor.x) * t1;
            const p1y = meteor.y + (tailY - meteor.y) * t1;
            const alpha = meteor.opacity * (1 - t0);

            ctx.strokeStyle = `rgba(255, 255, 255, ${alpha.toFixed(3)})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(p0x, p0y);
            ctx.lineTo(p1x, p1y);
            ctx.stroke();
          }

          ctx.fillStyle = `rgba(255, 255, 255, ${meteor.opacity.toFixed(3)})`;
          ctx.fillRect(meteor.x - 1, meteor.y - 1, 3, 3);
        }
      }

      function updateScene() {
        galaxyRotation += galaxyRotationSpeed;

        stars.forEach((star) => {
          star.twinkle += 0.01;
          star.opacity = 0.5 + Math.sin(star.twinkle) * 0.5;
          star.y += star.speed;

          if (star.y > height) {
            star.y = 0;
            star.x = Math.random() * width;
          }
        });

        if (meteors.length < maxMeteors && Math.random() < meteorSpawnRate) {
          meteors.push({
            x: Math.random() * width,
            y: 0,
            length: randomRange(40, 120),
            speed: randomRange(4, 12),
            opacity: 1,
            angle: Math.PI / 4 + Math.random() * 0.2,
          });
        }

        for (let i = meteors.length - 1; i >= 0; i -= 1) {
          const meteor = meteors[i];
          meteor.x += Math.cos(meteor.angle) * meteor.speed;
          meteor.y += Math.sin(meteor.angle) * meteor.speed;
          meteor.opacity -= 0.01;

          if (meteor.opacity <= 0 || meteor.y > height) {
            meteors.splice(i, 1);
          }
        }
      }

      function frame() {
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = "#0a0a1a";
        ctx.fillRect(0, 0, width, height);

        updateScene();
        drawGalaxyLayers();
        drawStars();
        drawMeteors();

        window.requestAnimationFrame(frame);
      }

      window.addEventListener("resize", resize, { passive: true });
      resize();
      frame();
    })();
  </script>
</body>
</html>
