      function updateGraphTransform() {
        ui.graphLayer.style.transform = "translate(" + state.canvasOffset.x + "px, " + state.canvasOffset.y + "px) scale(" + state.canvasScale + ")";
        ui.zoomText.textContent = String(Math.round(state.canvasScale * 100)) + "%";
      }

      function getPortAnchor(node, side, index) {
        const y = node.position.y + PORT_TOP_BASE + (PORT_WRAP_SIZE / 2) + index * PORT_STEP;
        if (side === "output") {
          return { x: node.position.x + NODE_WIDTH, y: y };
        }
        return { x: node.position.x, y: y };
      }

      function buildRoutingObstacles(ignoreNodeIds) {
        const ignore = ignoreNodeIds || {};
        return state.logicNodes.filter(function (node) {
          return !ignore[node.id];
        }).map(function (node) {
          return {
            left: node.position.x - ROUTE_MARGIN,
            right: node.position.x + NODE_WIDTH + ROUTE_MARGIN,
            top: node.position.y - ROUTE_MARGIN,
            bottom: node.position.y + NODE_HEIGHT + ROUTE_MARGIN
          };
        });
      }

      function segmentHitsRect(a, b, rect) {
        if (a.x === b.x) {
          const y1 = Math.min(a.y, b.y);
          const y2 = Math.max(a.y, b.y);
          return a.x >= rect.left && a.x <= rect.right && y2 >= rect.top && y1 <= rect.bottom;
        }
        if (a.y === b.y) {
          const x1 = Math.min(a.x, b.x);
          const x2 = Math.max(a.x, b.x);
          return a.y >= rect.top && a.y <= rect.bottom && x2 >= rect.left && x1 <= rect.right;
        }
        return true;
      }

      function routeCollisionCount(points, obstacles) {
        let collisions = 0;
        for (let i = 1; i < points.length; i += 1) {
          const a = points[i - 1];
          const b = points[i];
          for (let j = 0; j < obstacles.length; j += 1) {
            if (segmentHitsRect(a, b, obstacles[j])) {
              collisions += 1;
            }
          }
        }
        return collisions;
      }

      function routeDistance(points) {
        let distance = 0;
        for (let i = 1; i < points.length; i += 1) {
          distance += Math.abs(points[i].x - points[i - 1].x) + Math.abs(points[i].y - points[i - 1].y);
        }
        return distance;
      }

      function simplifyRoute(points) {
        const compact = [];
        points.forEach(function (p) {
          if (!compact.length) {
            compact.push({ x: p.x, y: p.y });
            return;
          }
          const prev = compact[compact.length - 1];
          if (prev.x === p.x && prev.y === p.y) return;
          compact.push({ x: p.x, y: p.y });
        });

        const simplified = [];
        for (let i = 0; i < compact.length; i += 1) {
          const prev = simplified[simplified.length - 1];
          const curr = compact[i];
          const next = compact[i + 1];

          if (prev && next) {
            const sameX = prev.x === curr.x && curr.x === next.x;
            const sameY = prev.y === curr.y && curr.y === next.y;
            if (sameX || sameY) {
              continue;
            }
          }

          simplified.push(curr);
        }

        return simplified;
      }

      function pointsToPath(points) {
        if (!points.length) return "";
        const cmds = ["M", points[0].x, points[0].y];
        for (let i = 1; i < points.length; i += 1) {
          cmds.push("L", points[i].x, points[i].y);
        }
        return cmds.join(" ");
      }

      function routeStubX(point, side, towardX) {
        if (side === "output") {
          return point.x + ROUTE_STUB;
        }
        if (side === "input") {
          return point.x - ROUTE_STUB;
        }
        return towardX >= point.x ? point.x + ROUTE_STUB : point.x - ROUTE_STUB;
      }

      function collectRouteYCandidates(from, to, obstacles) {
        const result = [];
        const marker = {};

        function addY(value) {
          if (!Number.isFinite(value)) return;
          const y = Math.round(value);
          const key = String(y);
          if (marker[key]) return;
          marker[key] = true;
          result.push(y);
        }

        addY(from.y);
        addY(to.y);
        addY((from.y + to.y) * 0.5);
        addY(Math.min(from.y, to.y) - ROUTE_BYPASS);
        addY(Math.max(from.y, to.y) + ROUTE_BYPASS);

        obstacles.forEach(function (rect) {
          addY(rect.top - ROUTE_BYPASS);
          addY(rect.bottom + ROUTE_BYPASS);
        });

        return result;
      }

      function horizontalRoutePoints(from, to, routeY) {
        return simplifyRoute([
          { x: from.x, y: from.y },
          { x: from.x, y: routeY },
          { x: to.x, y: routeY },
          { x: to.x, y: to.y }
        ]);
      }

      function outerRoutePoints(from, to, outerX) {
        return simplifyRoute([
          { x: from.x, y: from.y },
          { x: outerX, y: from.y },
          { x: outerX, y: from.y },
          { x: outerX, y: to.y },
          { x: to.x, y: to.y },
          { x: to.x, y: to.y }
        ]);
      }

      function routePoints(from, to, obstacles) {
        const candidates = [];
        const yCandidates = collectRouteYCandidates(from, to, obstacles);

        yCandidates.forEach(function (routeY) {
          candidates.push(horizontalRoutePoints(from, to, routeY));
        });

        let minLeft = Math.min(from.x, to.x);
        let maxRight = Math.max(from.x, to.x);
        obstacles.forEach(function (rect) {
          minLeft = Math.min(minLeft, rect.left);
          maxRight = Math.max(maxRight, rect.right);
        });

        candidates.push(outerRoutePoints(from, to, minLeft - ROUTE_BYPASS));
        candidates.push(outerRoutePoints(from, to, maxRight + ROUTE_BYPASS));

        let bestPoints = candidates[0] || simplifyRoute([{ x: from.x, y: from.y }, { x: to.x, y: to.y }]);
        let bestScore = routeCollisionCount(bestPoints, obstacles) * ROUTE_PENALTY + routeDistance(bestPoints);

        for (let i = 1; i < candidates.length; i += 1) {
          const points = candidates[i];
          const score = routeCollisionCount(points, obstacles) * ROUTE_PENALTY + routeDistance(points);
          if (score < bestScore) {
            bestScore = score;
            bestPoints = points;
          }
        }

        return bestPoints;
      }

      function drawPath(from, to, color, options) {
        const opts = options || {};
        const fromSide = opts.fromSide || "output";
        const toSide = opts.toSide || "input";
        const obstacles = Array.isArray(opts.obstacles) ? opts.obstacles : [];
        const fromStub = {
          x: routeStubX(from, fromSide, to.x),
          y: from.y
        };
        const toStub = {
          x: routeStubX(to, toSide, from.x),
          y: to.y
        };
        const routed = routePoints(fromStub, toStub, obstacles);
        const points = simplifyRoute([
          { x: from.x, y: from.y }
        ].concat(routed).concat([
          { x: to.x, y: to.y }
        ]));
        const d = pointsToPath(points);

        const glow = document.createElementNS("http://www.w3.org/2000/svg", "path");
        glow.setAttribute("d", d);
        glow.setAttribute("fill", "none");
        glow.setAttribute("stroke", color);
        glow.setAttribute("stroke-width", "4");
        glow.setAttribute("stroke-opacity", "0.28");
        glow.setAttribute("filter", "url(#none)");
        glow.style.pointerEvents = "none";

        const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
        line.setAttribute("d", d);
        line.setAttribute("fill", "none");
        line.setAttribute("stroke", color);
        line.setAttribute("stroke-width", "2");
        line.style.pointerEvents = "none";

        return { glow: glow, line: line, d: d };
      }

      function renderGraph() {
        updateGraphTransform();
        ui.nodesLayer.innerHTML = "";
        ui.graphLinks.innerHTML = "";

        const hasSelectedConnection = state.logicConnections.some(function (conn) {
          return connectionKey(conn) === state.selectedConnectionKey;
        });
        if (!hasSelectedConnection) {
          state.selectedConnectionKey = "";
        }

        state.logicConnections.forEach(function (conn) {
          const fromNode = nodeById(conn.from_id);
          const toNode = nodeById(conn.to_id);
          if (!fromNode || !toNode) return;
          const from = getPortAnchor(fromNode, "output", conn.from_port || 0);
          const to = getPortAnchor(toNode, "input", conn.to_port || 0);
          const obstacles = buildRoutingObstacles({});
          const color = colorForType(fromNode.type, fromNode.visual_color);
          const key = connectionKey(conn);
          const p = drawPath(from, to, color, {
            fromSide: "output",
            toSide: "input",
            obstacles: obstacles
          });
          ui.graphLinks.appendChild(p.glow);
          ui.graphLinks.appendChild(p.line);

          const hit = document.createElementNS("http://www.w3.org/2000/svg", "path");
          hit.setAttribute("d", p.d);
          hit.setAttribute("fill", "none");
          hit.setAttribute("stroke", "rgba(0,0,0,0)");
          hit.setAttribute("stroke-width", "12");
          hit.style.pointerEvents = "stroke";
          hit.style.cursor = "pointer";
          hit.addEventListener("click", function (event) {
            event.stopPropagation();
            if (event.altKey || event.ctrlKey || event.metaKey) {
              removeConnectionByKey(key);
              return;
            }
            state.selectedConnectionKey = key;
            state.selectedNodeId = null;
            state.selectedNodeIds = [];
            renderGraph();
            renderRightPanel();
          });
          hit.addEventListener("contextmenu", function (event) {
            event.preventDefault();
            event.stopPropagation();
            removeConnectionByKey(key);
          });
          ui.graphLinks.appendChild(hit);

          if (state.selectedConnectionKey === key) {
            const selected = document.createElementNS("http://www.w3.org/2000/svg", "path");
            selected.setAttribute("d", p.d);
            selected.setAttribute("fill", "none");
            selected.setAttribute("stroke", "#ffc800");
            selected.setAttribute("stroke-width", "3");
            selected.style.pointerEvents = "none";
            ui.graphLinks.appendChild(selected);
          }
        });

        if (state.connectFrom) {
          const startNode = nodeById(state.connectFrom.nodeId);
          if (startNode) {
            const fromSide = state.connectFrom.side;
            const from = getPortAnchor(startNode, fromSide, state.connectFrom.portIndex || 0);
            const to = state.connectFrom.cursor || from;
            const p = drawPath(from, to, "#00d9ff", {
              fromSide: fromSide,
              toSide: drag.connectHover ? drag.connectHover.side : "auto",
              obstacles: buildRoutingObstacles({})
            });
            ui.graphLinks.appendChild(p.glow);
            ui.graphLinks.appendChild(p.line);
          }
        }

        state.logicNodes.forEach(function (node) {
          const card = document.createElement("article");
          card.className = "logic-node" + (isNodeSelected(node.id) ? " selected" : "");
          card.style.left = String(node.position.x) + "px";
          card.style.top = String(node.position.y) + "px";
          const nodeStyle = nodeVisualStyle(node.type, node.visual_color);
          card.style.borderColor = nodeStyle.stroke;
          card.style.background = "linear-gradient(180deg, " + nodeStyle.fill + ", rgba(8, 18, 33, 0.96))";

          const title = document.createElement("div");
          title.className = "node-title";
          title.style.background = nodeStyle.stroke + "15";
          title.style.borderBottomColor = nodeStyle.stroke + "40";
          const icon = document.createElement("span");
          icon.className = "node-title-icon";
          icon.style.color = nodeStyle.glow;
          icon.innerHTML = pixelIconSvg(nodeStyle.iconKey);
          const titleText = document.createElement("span");
          titleText.textContent = node.display_name.length > 10 ? node.display_name.slice(0, 10) + ".." : node.display_name;
          titleText.style.color = nodeStyle.glow;
          title.appendChild(icon);
          title.appendChild(titleText);
          function startNodeDrag(event) {
            if (event.button !== 0) return;
            if (event.target && (event.target.closest(".port") || event.target.closest(".port-wrap"))) return;
            state.selectedConnectionKey = "";
            if (!event.shiftKey) {
              state.selectedNodeIds = [];
            }
            state.selectedNodeId = node.id;
            if (state.selectedNodeIds.indexOf(node.id) < 0) {
              state.selectedNodeIds.push(node.id);
            }
            drag.nodeId = node.id;
            drag.startMouse.x = event.clientX;
            drag.startMouse.y = event.clientY;
            drag.startPos.x = node.position.x;
            drag.startPos.y = node.position.y;
            event.stopPropagation();
            event.preventDefault();
            renderGraph();
            renderRightPanel();
          }
          title.addEventListener("mousedown", startNodeDrag);

          const sub = document.createElement("div");
          sub.className = "node-sub";
          const entries = Object.entries(node.value || {}).slice(0, 2);
          if (entries.length > 0) {
            entries.forEach(function (entry) {
              const row = document.createElement("div");
              row.className = "node-param-row";
              const keyEl = document.createElement("span");
              keyEl.className = "node-param-key";
              keyEl.textContent = String(entry[0]) + ":";
              const valEl = document.createElement("span");
              valEl.className = "node-param-val";
              valEl.style.color = nodeStyle.glow;
              valEl.textContent = String(entry[1]);
              row.appendChild(keyEl);
              row.appendChild(valEl);
              sub.appendChild(row);
            });
          } else {
            const row = document.createElement("div");
            row.className = "node-param-row";
            const keyEl = document.createElement("span");
            keyEl.className = "node-param-key";
            keyEl.textContent = "type:";
            const valEl = document.createElement("span");
            valEl.className = "node-param-val";
            valEl.style.color = nodeStyle.glow;
            valEl.textContent = node.type;
            row.appendChild(keyEl);
            row.appendChild(valEl);
            sub.appendChild(row);
          }

          const manaTag = document.createElement("div");
          const manaCost = inferNodeManaCost(node);
          manaTag.className = "node-mana-tag";
          manaTag.textContent = String(manaCost);
          if (manaCost <= 0) {
            manaTag.style.borderColor = "#4ade80";
            manaTag.style.color = "#86efac";
            manaTag.style.boxShadow = "0 0 8px rgba(74, 222, 128, 0.18)";
          }
          sub.appendChild(manaTag);

          card.appendChild(title);
          card.appendChild(sub);
          card.addEventListener("mousedown", startNodeDrag);

          const forcedPorts = inferPorts(node.type, null);
          var inCount = Number(node.inputs);
          var outCount = Number(node.outputs);
          if (!Number.isFinite(inCount)) inCount = forcedPorts.inputs;
          if (!Number.isFinite(outCount)) outCount = forcedPorts.outputs;
          if (forcedPorts.inputs === 0) inCount = 0;
          if (forcedPorts.outputs === 0) outCount = 0;
          inCount = Math.max(0, Math.floor(inCount));
          outCount = Math.max(0, Math.floor(outCount));

          for (let i = 0; i < inCount; i += 1) {
            const wrap = document.createElement("div");
            wrap.className = "port-wrap input";
            wrap.style.top = String(PORT_TOP_BASE + i * PORT_STEP) + "px";
            wrap.dataset.nodeId = node.id;
            wrap.dataset.side = "input";
            wrap.dataset.portIndex = String(i);
            const port = document.createElement("div");
            port.className = "port";
            port.style.background = isNodeSelected(node.id) ? nodeStyle.glow : nodeStyle.stroke;
            port.style.borderColor = nodeStyle.glow;
            port.style.boxShadow = "0 0 8px " + nodeStyle.glow + "80, inset 0 0 4px " + nodeStyle.glow + "40";
            wrap.appendChild(port);
            wrap.addEventListener("mousedown", function (event) {
              if (event.button !== 0) return;
              event.stopPropagation();
              event.preventDefault();
              beginPortConnect(node.id, "input", i, event);
            });
            wrap.addEventListener("mouseenter", function () {
              drag.connectHover = { nodeId: node.id, side: "input", portIndex: i };
            });
            wrap.addEventListener("mouseleave", function () {
              drag.connectHover = null;
            });
            wrap.addEventListener("click", function (event) {
              event.stopPropagation();
              event.preventDefault();
              onPortClick(node.id, "input", i, event);
            });
            wrap.addEventListener("contextmenu", function (event) {
              event.preventDefault();
              event.stopPropagation();
              removeConnectionsByPort(node.id, "input", i);
            });
            card.appendChild(wrap);
          }

          for (let i = 0; i < outCount; i += 1) {
            const wrap = document.createElement("div");
            wrap.className = "port-wrap output";
            wrap.style.top = String(PORT_TOP_BASE + i * PORT_STEP) + "px";
            wrap.dataset.nodeId = node.id;
            wrap.dataset.side = "output";
            wrap.dataset.portIndex = String(i);
            const port = document.createElement("div");
            port.className = "port";
            port.style.background = isNodeSelected(node.id) ? nodeStyle.glow : nodeStyle.stroke;
            port.style.borderColor = nodeStyle.glow;
            port.style.boxShadow = "0 0 8px " + nodeStyle.glow + "80, inset 0 0 4px " + nodeStyle.glow + "40";
            wrap.appendChild(port);
            wrap.addEventListener("mousedown", function (event) {
              if (event.button !== 0) return;
              event.stopPropagation();
              event.preventDefault();
              beginPortConnect(node.id, "output", i, event);
            });
            wrap.addEventListener("mouseenter", function () {
              drag.connectHover = { nodeId: node.id, side: "output", portIndex: i };
            });
            wrap.addEventListener("mouseleave", function () {
              drag.connectHover = null;
            });
            wrap.addEventListener("click", function (event) {
              event.stopPropagation();
              event.preventDefault();
              onPortClick(node.id, "output", i, event);
            });
            wrap.addEventListener("contextmenu", function (event) {
              event.preventDefault();
              event.stopPropagation();
              removeConnectionsByPort(node.id, "output", i);
            });
            card.appendChild(wrap);
          }

          ui.nodesLayer.appendChild(card);
        });

        updateIssuesBadge();
      }

      function onPortClick(nodeId, side, portIndex, event) {
        if (event && (event.altKey || event.ctrlKey || event.metaKey)) {
          state.connectFrom = null;
          removeConnectionsByPort(nodeId, side, portIndex);
          return;
        }

        if (!state.connectFrom) {
          state.selectedConnectionKey = "";
          state.connectFrom = {
            nodeId: nodeId,
            side: side,
            portIndex: portIndex,
            cursor: null
          };
          renderGraph();
          return;
        }

        const from = state.connectFrom;
        if (from.nodeId === nodeId && from.side === side) {
          state.connectFrom = null;
          renderGraph();
          return;
        }

        if (from.side === side) {
          state.connectFrom = {
            nodeId: nodeId,
            side: side,
            portIndex: portIndex,
            cursor: null
          };
          renderGraph();
          return;
        }

        let conn;
        if (from.side === "output") {
          conn = {
            from_id: from.nodeId,
            from_port: from.portIndex,
            to_id: nodeId,
            to_port: portIndex
          };
        } else {
          conn = {
            from_id: nodeId,
            from_port: portIndex,
            to_id: from.nodeId,
            to_port: from.portIndex
          };
        }

        if (!connectionExists(conn.from_id, conn.from_port, conn.to_id, conn.to_port)) {
          state.logicConnections.push(conn);
          state.selectedConnectionKey = "";
          scheduleGraphSync();
        }

        state.connectFrom = null;
        renderGraph();
      }

      function trackGraphPointer(clientX, clientY) {
        if (!state.connectFrom) return;
        const rect = ui.graphBoard.getBoundingClientRect();
        state.connectFrom.cursor = {
          x: (clientX - rect.left - state.canvasOffset.x) / state.canvasScale,
          y: (clientY - rect.top - state.canvasOffset.y) / state.canvasScale
        };
        renderGraph();
      }

      function beginPortConnect(nodeId, side, portIndex, event) {
        state.connectFrom = {
          nodeId: nodeId,
          side: side,
          portIndex: portIndex,
          cursor: null
        };
        trackGraphPointer(event.clientX, event.clientY);
      }

      function finalizePortConnection(targetNodeId, targetSide, targetPortIndex) {
        if (!state.connectFrom) return;
        const from = state.connectFrom;
        state.connectFrom = null;

        if (!targetNodeId || !targetSide || typeof targetPortIndex !== "number") {
          renderGraph();
          return;
        }

        if (from.nodeId === targetNodeId && from.side === targetSide) {
          renderGraph();
          return;
        }

        if (from.side === targetSide) {
          renderGraph();
          return;
        }

        let conn;
        if (from.side === "output") {
          conn = {
            from_id: from.nodeId,
            from_port: from.portIndex,
            to_id: targetNodeId,
            to_port: targetPortIndex
          };
        } else {
          conn = {
            from_id: targetNodeId,
            from_port: targetPortIndex,
            to_id: from.nodeId,
            to_port: from.portIndex
          };
        }

        if (!connectionExists(conn.from_id, conn.from_port, conn.to_id, conn.to_port)) {
          state.logicConnections.push(conn);
          scheduleGraphSync();
        }

        renderGraph();
      }

      function setCell(x, y, brush, erase) {
        const key = String(x) + "," + String(y);
        if (erase || !brush) {
          state.visualCells.delete(key);
        } else {
          state.visualCells.set(key, {
            x: x,
            y: y,
            item_id: brush.item_id,
            name: brush.name,
            visual_type: brush.visual_type,
            color: brush.color
          });
        }
      }

      function getVisualBrush() {
        return state.visualPalette.find(function (p) { return p.item_id === state.visualBrushId; }) || null;
      }

      function applyPaintToCell(x, y, erase) {
        const key = String(x) + "," + String(y);
        const mode = erase ? "E" : "P";
        const paintKey = mode + ":" + key;
        if (drag.lastPaintKey === paintKey) return false;
        drag.lastPaintKey = paintKey;

        const brush = erase ? null : getVisualBrush();
        if (!erase && !brush) return false;

        const before = state.visualCells.has(key) ? JSON.stringify(state.visualCells.get(key)) : "";
        setCell(x, y, brush, erase);
        const after = state.visualCells.has(key) ? JSON.stringify(state.visualCells.get(key)) : "";
        if (before === after) return false;

        return true;
      }

      function paintVisualCellElement(cellEl, erase) {
        if (!cellEl) return false;
        const x = Number(cellEl.dataset.x || "-1");
        const y = Number(cellEl.dataset.y || "-1");
        if (!Number.isFinite(x) || !Number.isFinite(y) || x < 0 || y < 0) return false;

        const changed = applyPaintToCell(x, y, erase);
        if (!changed) return false;

        const key = String(x) + "," + String(y);
        const current = state.visualCells.get(key) || null;
        cellEl.style.background = current ? current.color : "rgba(7, 14, 29, 0.95)";
        renderRightPanel();
        scheduleVisualSync();
        return true;
      }

      function paintVisualAtClient(clientX, clientY, erase) {
        const target = document.elementFromPoint(clientX, clientY);
        if (!target) return false;
        const cell = target.closest(".visual-cell");
        if (!cell) return false;
        return paintVisualCellElement(cell, erase);
      }

      function renderVisualGrid() {
        const size = Math.max(MIN_VIS_SCALE, Math.min(MAX_VIS_SCALE, state.visualScale));
        const cellSize = Math.max(2, Math.floor(size));

        ui.vZoomText.textContent = String(size) + "x";
        ui.visualTitle.textContent = "法杖外观编辑器 (16x48) | 滚轮缩放: " + String(size) + "x";

        ui.visualGrid.style.gridTemplateColumns = "repeat(" + String(GRID_W) + ", " + String(cellSize) + "px)";
        ui.visualGrid.innerHTML = "";

        for (let y = 0; y < GRID_H; y += 1) {
          for (let x = 0; x < GRID_W; x += 1) {
            const key = String(x) + "," + String(y);
            const cell = state.visualCells.get(key) || null;
            const el = document.createElement("div");
            el.className = "visual-cell";
            el.style.width = String(cellSize) + "px";
            el.style.height = String(cellSize) + "px";
            if (cell) {
              el.style.background = cell.color;
            }
            el.dataset.x = String(x);
            el.dataset.y = String(y);

            el.addEventListener("mousedown", function (event) {
              event.preventDefault();
              if (event.button !== 0 && event.button !== 2) return;
              drag.paint = event.button === 0;
              drag.paintErase = event.button === 2;
              drag.lastPaintKey = "";
              paintVisualCellElement(el, drag.paintErase);
            });

            el.addEventListener("contextmenu", function (event) {
              event.preventDefault();
            });

            ui.visualGrid.appendChild(el);
          }
        }
      }

      function renderTopStats() {
        ui.wandName.value = state.wandName;
        ui.manaText.textContent = String(state.mana) + "/" + String(state.manaCapacity);
        ui.nodeText.textContent = String(state.logicNodes.length) + "/" + String(state.logicCapacity);
      }

      function createPixelPanel(title, accentColor, bodyHtml) {
        const card = document.createElement("section");
        card.className = "card";
        card.style.borderColor = accentColor;
        card.style.boxShadow = "inset 0 0 18px " + accentColor + "15, 0 0 0 1px rgba(13, 18, 38, 0.95)";

        const titleBar = document.createElement("div");
        titleBar.className = "card-title";
        titleBar.style.color = accentColor;
        titleBar.style.background = "linear-gradient(180deg, " + accentColor + "28, " + accentColor + "10)";
        titleBar.style.borderBottomColor = accentColor + "40";
        titleBar.textContent = title;
        card.appendChild(titleBar);

        const body = document.createElement("div");
        body.className = "card-body";
        body.innerHTML = bodyHtml;
        card.appendChild(body);
        return card;
      }

      function renderRightPanel() {
        ui.rightContent.innerHTML = "";

        if (state.activeTab === "visual") {
          const count = state.visualCells.size;
          const kinds = new Set(Array.from(state.visualCells.values()).map(function (c) { return c.item_id; })).size;

          const card = createPixelPanel(
            "模块统计",
            "#00d9ff",
            '<div class="kv"><span class="k">已用格子</span><span class="v" style="color:#00d9ff">' + String(count) + ' / 768</span></div>' +
            '<div class="kv"><span class="k">模块种类</span><span class="v" style="color:#ffc800">' + String(kinds) + '</span></div>' +
            '<div class="kv"><span class="k">操作提示</span><span class="v" style="color:#6b6b8d">左键绘制 / 右键擦除</span></div>'
          );
          ui.rightContent.appendChild(card);
          return;
        }

        const selected = state.logicNodes.find(function (n) { return n.id === state.selectedNodeId; }) || null;
        if (state.selectedNodeIds.length > 1) {
          const card = createPixelPanel(
            "多选节点",
            "#ffc800",
            '<div class="kv"><span class="k">已选数量</span><span class="v" style="color:#ffc800">' + String(state.selectedNodeIds.length) + '</span></div>' +
            '<div class="kv"><span class="k">提示</span><span class="v">按 Delete 可批量删除</span></div>'

          const selectedStyle = nodeVisualStyle(selected.type, selected.visual_color);
          const card = createPixelPanel(
            "节点属性",

          );
          ui.rightContent.appendChild(card);

          const del = document.createElement("button");
          del.className = "px-btn";
          del.textContent = "删除节点";
          del.addEventListener("click", function () {
            removeNode(selected.id);
          });
          ui.rightContent.appendChild(del);
          return;
        }

        const statCard = createPixelPanel(
          "法杖属性",
          "#00d9ff",
          '<div class="kv"><span class="k">魔力容量</span><span class="v" style="color:#00d9ff">' + String(state.manaCapacity) + '</span></div>' +
          '<div class="kv"><span class="k">逻辑槽位</span><span class="v" style="color:#a78bfa">' + String(state.logicNodes.length) + '/' + String(state.logicCapacity) + '</span></div>'
        );
        ui.rightContent.appendChild(statCard);

        const compileCard = createPixelPanel(
          "法术统计",
          "#ffc800",
          '<div class="kv"><span class="k">总消耗</span><span class="v" style="color:#ffc800">' + Number(state.compile.total_mana_cost || 0).toFixed(0) + '</span></div>' +
          '<div class="kv"><span class="k">延迟</span><span class="v" style="color:#86efac">' + Number(state.compile.cycle_delay || 0).toFixed(2) + 's</span></div>' +
          '<div class="kv"><span class="k">投射物</span><span class="v" style="color:#67e8f9">' + String(state.compile.projectile_count || 0) + '</span></div>' +
          '<div class="kv"><span class="k">理论伤害</span><span class="v" style="color:#fda4af">' + Number(state.compile.total_damage || 0).toFixed(1) + '</span></div>'
        );
        ui.rightContent.appendChild(compileCard);

        const status = document.createElement("section");
        const ok = !!state.compile.is_valid;
        status.style.padding = "8px";
        status.style.textAlign = "center";
        status.style.background = ok ? "rgba(74, 222, 128, 0.12)" : "rgba(255, 200, 0, 0.12)";
        status.style.border = "2px solid " + (ok ? "#4ade80" : "#ffc800");
        status.innerHTML = '<span style="font-size:8px;color:' + (ok ? '#86efac' : '#ffc800') + '">' + (ok ? '✓ 法术可用' : '⚠ 缺少投射物') + '</span>';
        ui.rightContent.appendChild(status);

        if (!state.compile.is_valid && Array.isArray(state.compile.errors) && state.compile.errors.length > 0) {
          const err = createPixelPanel(
            "编译错误",
            "#ef4444",
            '<div class="compile-bad">' + String(state.compile.errors[0]) + '</div>'
          );
          ui.rightContent.appendChild(err);
        }
      }

      function renderAll() {
        renderTopStats();
        setActiveTab(state.activeTab, false);
        renderLogicPalette();
        renderVisualPalette();
        renderGraph();
        renderVisualGrid();
        renderRightPanel();
      }

      function bindEvents() {
        ui.leftSplitter.addEventListener("mousedown", function (event) {
          startPanelResize("left", event);
        });

        ui.rightSplitter.addEventListener("mousedown", function (event) {
          startPanelResize("right", event);
        });

        ui.logicModeBtn.addEventListener("click", function () {
          setActiveTab("logic", true);
        });

        ui.visualModeBtn.addEventListener("click", function () {
          setActiveTab("visual", true);
        });

        ui.searchInput.addEventListener("input", function () {
          state.searchQuery = ui.searchInput.value || "";
          renderLogicPalette();
        });

        ui.wandName.addEventListener("change", function () {
          state.wandName = ui.wandName.value.trim() || "未命名法杖";
          postToGodot("wand_set_name", { wand_name: state.wandName });
        });

        ui.clearBtn.addEventListener("click", function () {
          if (state.activeTab === "logic") {
            state.logicNodes = [];
            state.logicConnections = [];
            state.selectedNodeId = null;
            state.selectedNodeIds = [];
            state.selectedConnectionKey = "";
            renderTopStats();
            renderGraph();
            renderRightPanel();
            flushGraphSync();
          } else {
            state.visualCells.clear();
            renderVisualGrid();
            renderRightPanel();
            flushVisualSync();
          }
          postToGodot("wand_clear", { mode: state.activeTab });
        });

        ui.saveBtn.addEventListener("click", function () {
          flushGraphSync();
          flushVisualSync();
          const ok = postToGodot("wand_save", {
            nodes: serializeGraphNodes(),
            connections: serializeGraphConns(),
            cells: serializeVisualCells()
          });
          if (!ok) {
            showToast("保存消息发送失败", "error");
          }
        });

        ui.switchBtn.addEventListener("click", function () {
          const ok = postToGodot("wand_open_selector", {});
          if (!ok) {
            showToast("切换法杖消息发送失败", "error");
          }
        });

        ui.closeBtn.addEventListener("click", function () {
          postToGodot("wand_close", {});
        });

        ui.zoomOutBtn.addEventListener("click", function () {
          state.canvasScale = Math.max(MIN_SCALE, state.canvasScale / 1.2);
          updateGraphTransform();
        });

        ui.zoomInBtn.addEventListener("click", function () {
          state.canvasScale = Math.min(MAX_SCALE, state.canvasScale * 1.2);
          updateGraphTransform();
        });

        ui.zoomResetBtn.addEventListener("click", function () {
          state.canvasScale = 1;
          state.canvasOffset.x = 0;
          state.canvasOffset.y = 0;
          updateGraphTransform();
        });

        ui.vZoomOutBtn.addEventListener("click", function () {
          state.visualScale = Math.max(MIN_VIS_SCALE, state.visualScale - 1);
          renderVisualGrid();
        });

        ui.vZoomInBtn.addEventListener("click", function () {
          state.visualScale = Math.min(MAX_VIS_SCALE, state.visualScale + 1);
          renderVisualGrid();
        });

        ui.vZoomResetBtn.addEventListener("click", function () {
          state.visualScale = 8;
          renderVisualGrid();
        });

        ui.graphBoard.addEventListener("mousedown", function (event) {
          if (event.button === 1) {
            drag.graphPanning = true;
            drag.graphStartMouse.x = event.clientX;
            drag.graphStartMouse.y = event.clientY;
            drag.graphStartOffset.x = state.canvasOffset.x;
            drag.graphStartOffset.y = state.canvasOffset.y;
            ui.graphBoard.style.cursor = "grabbing";
            event.preventDefault();
            return;
          }

          if (event.button === 0) {
            const target = event.target;
            const isDomNode = !!(target && typeof target.closest === "function");
            const hitNode = isDomNode ? target.closest(".logic-node") : null;
            const hitPort = isDomNode ? (target.closest(".port") || target.closest(".port-wrap")) : null;
            const hitConnection = !!(target && target.tagName && String(target.tagName).toLowerCase() === "path");
            if (hitNode || hitPort || hitConnection) {
              return;
            }

            const local = boardLocalFromClient(event.clientX, event.clientY);
            drag.selecting = true;
            drag.selectStart = local;
            drag.selectCurrent = local;
            updateSelectionBox();

            state.selectedNodeId = null;
            state.selectedNodeIds = [];
            state.selectedConnectionKey = "";
            state.connectFrom = null;
            renderGraph();
            renderRightPanel();
          }
        });

        window.addEventListener("mousemove", function (event) {
          if (drag.resizing) {
            const width = Math.max(ui.content.clientWidth, 1);
            const dxRatio = (event.clientX - drag.resizeStartX) / width;
            if (drag.resizing === "left") {
              applyLayoutRatios({
                left_ratio: drag.resizeStartLeft + dxRatio,
                right_ratio: drag.resizeStartRight
              }, "left");
            } else {
              applyLayoutRatios({
                left_ratio: drag.resizeStartLeft,
                right_ratio: drag.resizeStartRight - dxRatio
              }, "right");
            }
            return;
          }

          if ((drag.paint || drag.paintErase) && state.activeTab === "visual") {
            const hasLeft = (event.buttons & 1) !== 0;
            const hasRight = (event.buttons & 2) !== 0;
            if (!hasLeft && !hasRight) {
              drag.paint = false;
              drag.paintErase = false;
              drag.lastPaintKey = "";
              return;
            }

            const erase = drag.paintErase && !drag.paint;
            paintVisualAtClient(event.clientX, event.clientY, erase);
            return;
          }

          if (drag.paletteItem) {
            const dx = Math.abs(event.clientX - drag.paletteStart.x);
            const dy = Math.abs(event.clientY - drag.paletteStart.y);
            if (dx > 3 || dy > 3) {
              drag.paletteMoved = true;
            }
            updatePaletteGhost(event.clientX, event.clientY);
          }

          if (drag.nodeId) {
            const node = nodeById(drag.nodeId);
            if (!node) return;
            const dx = (event.clientX - drag.startMouse.x) / state.canvasScale;
            const dy = (event.clientY - drag.startMouse.y) / state.canvasScale;
            node.position.x = Math.round((drag.startPos.x + dx) / 8) * 8;
            node.position.y = Math.round((drag.startPos.y + dy) / 8) * 8;
            renderGraph();
            scheduleGraphSync();
            return;
          }

          if (drag.graphPanning) {
            state.canvasOffset.x = drag.graphStartOffset.x + (event.clientX - drag.graphStartMouse.x);
            state.canvasOffset.y = drag.graphStartOffset.y + (event.clientY - drag.graphStartMouse.y);
            updateGraphTransform();
            return;
          }

          if (drag.selecting) {
            drag.selectCurrent = boardLocalFromClient(event.clientX, event.clientY);
            updateSelectionBox();
            return;
          }

          if (state.connectFrom) {
            trackGraphPointer(event.clientX, event.clientY);
          }
        });

        window.addEventListener("mouseup", function (event) {
          stopPanelResize();
          finalizeLogicPaletteDrag(event);

          if (state.connectFrom && drag.connectHover) {
            finalizePortConnection(
              drag.connectHover.nodeId,
              drag.connectHover.side,
              Number(drag.connectHover.portIndex || 0)
            );
          } else if (state.connectFrom) {
            finalizePortConnection("", "", 0);
          }

          if (drag.selecting) {
            finalizeMarqueeSelection();
          }

          drag.nodeId = "";
          drag.graphPanning = false;
          drag.paint = false;
          drag.paintErase = false;
          drag.lastPaintKey = "";
          drag.connectHover = null;
          ui.graphBoard.style.cursor = "grab";
        });

        window.addEventListener("blur", function () {
          drag.paint = false;
          drag.paintErase = false;
          drag.lastPaintKey = "";
        });

        ui.graphBoard.addEventListener("wheel", function (event) {
          if (!event.ctrlKey && !event.metaKey) return;
          event.preventDefault();
          const mul = event.deltaY > 0 ? 0.92 : 1.08;
          state.canvasScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, state.canvasScale * mul));
          updateGraphTransform();
        }, { passive: false });

        ui.visualWrap.addEventListener("contextmenu", function (event) {
          event.preventDefault();
        });

        window.addEventListener("contextmenu", function (event) {
          if (state.activeTab === "visual" && (drag.paintErase || drag.paint)) {
            event.preventDefault();
          }
        });

        ui.visualWrap.addEventListener("wheel", function (event) {
          event.preventDefault();
          state.visualScale = Math.max(MIN_VIS_SCALE, Math.min(MAX_VIS_SCALE, state.visualScale + (event.deltaY > 0 ? -1 : 1)));
          renderVisualGrid();
        }, { passive: false });

        window.addEventListener("keydown", function (event) {
          const target = event ? event.target : null;
          const tagName = String(target && target.tagName ? target.tagName : "").toUpperCase();
          const isTypingElement = tagName === "INPUT" || tagName === "TEXTAREA" || tagName === "SELECT" || (target && target.isContentEditable === true);
          const loweredKey = String(event && event.key ? event.key : "").toLowerCase();
          if (!isTypingElement && (
            loweredKey === "w" || loweredKey === "a" || loweredKey === "s" || loweredKey === "d" ||
            loweredKey === "arrowup" || loweredKey === "arrowdown" || loweredKey === "arrowleft" || loweredKey === "arrowright" ||
            loweredKey === " "
          )) {
            event.preventDefault();
            event.stopPropagation();
          }

          if (event.key === "Escape") {
            state.connectFrom = null;
            if (state.selectedNodeId) {
              state.selectedNodeId = null;
              state.selectedNodeIds = [];
              state.selectedConnectionKey = "";
              renderRightPanel();
            }
            clearSelectionBox();
            renderGraph();
            return;
          }

          if (event.key === "Delete" || event.key === "Backspace") {
            const selectedBatch = state.selectedNodeIds.slice();
            if (selectedBatch.length > 0) {
              event.preventDefault();
              removeNodes(selectedBatch);
              return;
            }

            if (state.selectedNodeId) {
              event.preventDefault();
              removeNode(state.selectedNodeId);
              return;
            }

            if (state.selectedConnectionKey) {
              event.preventDefault();
              removeConnectionByKey(state.selectedConnectionKey);
            }
          }
        });
      }

      function bootStars() {
        const canvas = document.getElementById("starfield");
        const ctx = canvas.getContext("2d", { alpha: true });
        const stars = [];
        const meteors = [];
        let width = 1;
        let height = 1;
        let rotation = 0;

        function rand(min, max) {
          return Math.random() * (max - min) + min;
        }

        function toPx(v) {
          return Math.floor(v / PX) * PX;
        }

        function resize() {
          width = Math.max(window.innerWidth, 1);
          height = Math.max(window.innerHeight, 1);
          canvas.width = width;
          canvas.height = height;
          stars.length = 0;
          for (let i = 0; i < 150; i += 1) {
            stars.push({
              x: Math.random() * width,
              y: Math.random() * height,
              layer: Math.floor(Math.random() * 3),
              speed: rand(0.15, 0.6),
              twinkle: Math.random() * Math.PI * 2
            });
          }
        }

        function drawGalaxy() {
          rotation += 0.001;
          for (let layer = 0; layer < 3; layer += 1) {
            const centerX = width * 0.7;
            const centerY = height * 0.3;
            const radius = 140 + layer * 46;
            const dir = layer % 2 === 0 ? 1 : -1;
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(rotation * dir * (1 + layer * 0.2));
            for (let i = 0; i < 140; i += 1) {
              const t = i / 140;
              const angle = t * Math.PI * 4;
              const d = t * radius;
              const x = toPx(Math.cos(angle) * d);
              const y = toPx(Math.sin(angle) * d);
              const a = (0.08 + t * 0.2) * (0.35 + layer * 0.16);
              ctx.fillStyle = "rgba(138, 43, 226, " + a.toFixed(3) + ")";
              ctx.fillRect(x, y, 2, 2);
            }
            ctx.restore();
          }
        }

        function drawStars(frame) {
          const colors = ["#4a1c6b", "#00d9ff", "#ffc800"];
          stars.forEach(function (s) {
            s.twinkle += 0.012;
            const pulse = 0.3 + Math.sin(s.twinkle + frame * 0.03) * 0.5;
            const size = (s.layer + 1) * PX;
            const x = toPx(s.x);
            const y = toPx(s.y);
            ctx.globalAlpha = Math.max(0.16, pulse);
            ctx.fillStyle = colors[s.layer];
            ctx.fillRect(x, y, size, size);
            ctx.globalAlpha = 1;
            s.y += s.speed + s.layer * 0.12;
            if (s.y > height + PX) {
              s.y = -PX;
              s.x = Math.random() * width;
            }
          });
        }

        function drawMeteors() {
          if (meteors.length < 3 && Math.random() < 0.012) {
            meteors.push({
              x: Math.random() * width,
              y: Math.random() * (height * 0.2),
              length: rand(40, 120),
              speed: rand(4, 10),
              opacity: 1,
              angle: Math.PI / 4 + Math.random() * 0.2
            });
          }

          for (let i = meteors.length - 1; i >= 0; i -= 1) {
            const m = meteors[i];
            const tailX = m.x - Math.cos(m.angle) * m.length;
            const tailY = m.y - Math.sin(m.angle) * m.length;
            const g = ctx.createLinearGradient(m.x, m.y, tailX, tailY);
            g.addColorStop(0, "rgba(255,255,255," + m.opacity.toFixed(3) + ")");
            g.addColorStop(1, "rgba(255,255,255,0)");
            ctx.strokeStyle = g;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(toPx(m.x), toPx(m.y));
            ctx.lineTo(toPx(tailX), toPx(tailY));
            ctx.stroke();
            m.x += Math.cos(m.angle) * m.speed;
            m.y += Math.sin(m.angle) * m.speed;
            m.opacity -= 0.01;
            if (m.opacity <= 0 || m.y > height + 30) {
              meteors.splice(i, 1);
            }
          }
        }

        function frame(ts) {
          ctx.fillStyle = "#0a0a1a";
          ctx.fillRect(0, 0, width, height);
          drawGalaxy();
          drawStars(Math.floor(ts / 16));
          drawMeteors();
          requestAnimationFrame(frame);
        }

        window.addEventListener("resize", resize, { passive: true });
        resize();
        frame(0);
      }

      // Receive state from Godot.
      document.addEventListener("message", function (event) {
        if (!event) return;
        const raw = typeof event.detail !== "undefined" ? event.detail : event.data;
        onGodotMessage(raw);
      });

      window.addEventListener("message", function (event) {
        if (!event) return;
        const raw = typeof event.detail !== "undefined" ? event.detail : event.data;
        onGodotMessage(raw);
      });

      window.godotReceive = onGodotMessage;

      bindEvents();
      bootStars();
      applyLayoutRatios(state.layoutRatios, "balanced");
      renderAll();

      postToGodot("wand_ready", {});
      postToGodot("wand_request_state", {});
      showToast("法杖编程壳已就绪", "info");
    })();
  </script>
